name: check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          cache: true

      - name: Install golangci-lint
        run: |
          curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b "$HOME/go/bin" v2.12.2
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Check
        run: make check
