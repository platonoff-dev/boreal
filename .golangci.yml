version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  allow-parallel-runners: false

linters:
  default: all
  disable:
    # Deprecated in golangci-lint v2; replacement linters remain enabled.
    - gomodguard
    - wsl
  settings:
    cyclop:
      max-complexity: 8
      package-average: 4.0
    depguard:
      rules:
        main:
          list-mode: lax
          files:
            - "$all"
          allow:
            - "$gostd"
            - github.com/platonoff-dev/boreal
    funlen:
      lines: 60
      statements: 40
    gocognit:
      min-complexity: 10
    gocyclo:
      min-complexity: 8
    lll:
      line-length: 100
    maintidx:
      under: 20
    mnd:
      ignored-numbers:
        - "0"
        - "1"
    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: true
    revive:
      severity: error
      rules:
        - name: exported
          severity: error
        - name: package-comments
          severity: error
    varnamelen:
      min-name-length: 3
      ignore-names:
        - err
        - got
        - t

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/platonoff-dev/boreal)

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
